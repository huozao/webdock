name: release

# Build the webdock image in CI (not on the 旧电脑) and push it to GHCR, so the
# laptop only pulls. The Dockerfile bakes in Chrome + Playwright/Patchright, so
# the heavy build happens once on a GitHub runner and is layer-cached after that.
on:
  push:
    branches: [main]
    tags: ["V*", "v*"]

concurrency:
  group: webdock-release
  cancel-in-progress: false

jobs:
  # Gate the image build on the unit tests. A direct push to main does NOT run
  # ci.yml (that only fires on pull_request), so without this gate a broken commit
  # pushed straight to main would still ship an image. Tests patch the browser
  # layer, so no Chrome/Playwright download is needed here.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/webdock
          # Immutable pin = the long commit SHA; `latest` tracks main; a Vx tag
          # publishes that release tag. Pin the 旧电脑 to a SHA/tag for repeatable deploys.
          tags: |
            type=sha,format=long
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=webdock
          cache-to: type=gha,mode=max,scope=webdock
