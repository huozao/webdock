[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
pidfile=/tmp/supervisord.pid
loglevel=info

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 %(ENV_DISPLAY_WIDTH)sx%(ENV_DISPLAY_HEIGHT)sx%(ENV_DISPLAY_DEPTH)s -ac -nolisten tcp +extension GLX
autorestart=true
priority=10
stdout_logfile=/app/logs/xvfb.log
stderr_logfile=/app/logs/xvfb.log

[program:x11vnc]
command=/usr/bin/x11vnc -display :99 -forever -shared -rfbport 5900 -xkb -rfbauth /app/.vnc/passwd
autorestart=true
priority=20
startsecs=2
stdout_logfile=/app/logs/x11vnc.log
stderr_logfile=/app/logs/x11vnc.log

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc/ 6080 localhost:5900
autorestart=true
priority=30
startsecs=2
stdout_logfile=/app/logs/novnc.log
stderr_logfile=/app/logs/novnc.log

[program:chrome]
command=/bin/bash -lc 'exec /usr/bin/webdock-chrome --user-data-dir=/app/browser_data --remote-debugging-address=127.0.0.1 --remote-debugging-port=9222 --no-first-run --no-default-browser-check --disable-dev-shm-usage --no-sandbox --disable-blink-features=AutomationControlled --window-size=1366,768 ${CHROME_PROXY_SERVER:+--proxy-server=$CHROME_PROXY_SERVER} https://chatgpt.com/'
directory=/app
autorestart=true
priority=40
startsecs=5
stdout_logfile=/app/logs/chrome.log
stderr_logfile=/app/logs/chrome.log
environment=DISPLAY=":99",HOME="/app"

[program:api]
command=python -m src
directory=/app
autorestart=true
priority=50
startsecs=5
stdout_logfile=/app/logs/api.log
stderr_logfile=/app/logs/api.log
environment=DISPLAY=":99",PYTHONPATH="/app"
